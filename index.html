<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Ball Hawk</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0d0d1a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        user-select: none;
      }

      /* ── Viewfinder ─────────────────────────────────────────────────── */
      #viewfinder {
        position: relative;
        flex: 1;
        overflow: hidden;
        background: #000;
      }

      #camera {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      /* ── Pulse ring ─────────────────────────────────────────────────── */
      #pulse {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 120px;
        height: 120px;
        transform: translate(-50%, -50%) scale(0);
        border-radius: 50%;
        border: 4px solid #00ff88;
        opacity: 0;
        pointer-events: none;
        transition: none;
      }

      #pulse.active {
        animation: pulse-ring 0.6s ease-out forwards;
      }

      @keyframes pulse-ring {
        0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
      }

      /* ── Status banner ──────────────────────────────────────────────── */
      #status {
        position: absolute;
        top: env(safe-area-inset-top, 12px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 20px;
        padding: 5px 14px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.03em;
        color: #aaa;
        white-space: nowrap;
      }

      #status.detecting {
        color: #00ff88;
      }

      /* ── Bottom controls ────────────────────────────────────────────── */
      #controls {
        flex-shrink: 0;
        padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px));
        background: #1a1a2e;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      #controls label {
        font-size: 12px;
        color: #aaa;
        white-space: nowrap;
      }

      #threshold {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 2px;
        background: #333;
        outline: none;
        cursor: pointer;
      }

      #threshold::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #00ff88;
        box-shadow: 0 0 6px #00ff8888;
        cursor: pointer;
      }

      #threshold-val {
        font-size: 13px;
        font-weight: 700;
        color: #00ff88;
        min-width: 36px;
        text-align: right;
      }

      /* ── Scan toggle button ──────────────────────────────────────────── */
      #toggle-btn {
        flex-shrink: 0;
        padding: 8px 16px;
        border: 2px solid #00ff88;
        border-radius: 20px;
        background: transparent;
        color: #00ff88;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.15s, color 0.15s;
      }

      #toggle-btn.paused {
        background: #00ff88;
        color: #0d0d1a;
      }

      /* ── Permission / error overlay ─────────────────────────────────── */
      #permission-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: #0d0d1aee;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        text-align: center;
        padding: 32px;
        z-index: 10;
      }

      #permission-overlay.visible {
        display: flex;
      }

      #permission-overlay p {
        font-size: 15px;
        color: #ccc;
        max-width: 280px;
        line-height: 1.5;
      }

      #start-btn {
        margin-top: 8px;
        padding: 12px 28px;
        border: none;
        border-radius: 28px;
        background: #00ff88;
        color: #0d0d1a;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="viewfinder">
      <video id="camera" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="pulse"></div>
      <div id="status">Initializing…</div>

      <div id="permission-overlay" class="visible">
        <p>Ball Hawk needs access to your camera to detect golf balls.</p>
        <button id="start-btn">Enable Camera</button>
        <p id="err-msg" style="color:#ff6b6b;font-size:13px;display:none"></p>
      </div>
    </div>

    <div id="controls">
      <label for="threshold">Min confidence</label>
      <input id="threshold" type="range" min="0" max="1" step="0.01" value="0.70" />
      <span id="threshold-val">70%</span>
      <button id="toggle-btn" disabled>Pause</button>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
